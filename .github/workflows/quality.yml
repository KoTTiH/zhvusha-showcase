name: Public Snapshot Quality

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zhvusha
          POSTGRES_USER: zhvusha
          POSTGRES_PASSWORD: zhvusha_dev
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system tools
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy src/ --strict

      - name: Import smoke
        run: python -c "from src.bot import main; from src.agent_runtime.runtime import AgentRuntime"
        env:
          BOT_TOKEN: fake_token_for_tests
          CHANNEL_ID: "@test"
          ADMIN_USER_ID: "0"
          DATABASE_URL: postgresql+asyncpg://zhvusha:zhvusha_dev@localhost:5432/zhvusha
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: fake_key_for_tests

      - name: Focused tests
        run: pytest -q --no-cov tests/agent_runtime tests/skills/test_invocation.py
        env:
          BOT_TOKEN: fake_token_for_tests
          CHANNEL_ID: "@test"
          ADMIN_USER_ID: "0"
          DATABASE_URL: postgresql+asyncpg://zhvusha:zhvusha_dev@localhost:5432/zhvusha
          REDIS_URL: redis://localhost:6379/0
          GOOGLE_API_KEY: fake_key_for_tests

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
