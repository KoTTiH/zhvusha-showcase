name: channel_writer
description: "Posts messages to the Telegram channel"
version: "1.0.0"
type: inline

llm_tier: strategist

triggers:
  - "/post "
  - "/post_draft "

cost_estimate: low
approval_policy: required  # publishing to channel — always requires approval (enforced in phase 5/7)

side_effects:
  - posts_to_channel
  - sends_telegram_message
  - writes_workspace  # archive.save_published_post writes to workspace/channel/posts/

mode_tags:
  - personal

modifies: []

parameters: {}  # full parameter loading deferred to a future phase

dependencies:
  leaf_modules: []
  skills:
    - src.skills.post_drafts.store

source: manual
created_at: "2026-04-11"

tests:
  contract: tests/skills/channel_writer/test_contract.py
  integration: tests/skills/channel_writer/test_integration.py
