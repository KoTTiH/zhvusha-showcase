    - src.skills.spec_command.parser
  skills: []

executor: codex_cli
max_duration_seconds: 240.0

source: manual
created_at: "2026-04-26"

tests:
  contract: tests/skills/ideation_to_spec/test_skill.py
  unit_tier_classifier: tests/skills/ideation_to_spec/test_tier_classifier.py
  unit_spec_writer: tests/skills/ideation_to_spec/test_spec_writer.py
